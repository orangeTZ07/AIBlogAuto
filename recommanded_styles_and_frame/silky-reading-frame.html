<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>{title} - {blog_name}</title>
  <link rel="stylesheet" href="{style_href}" />
</head>
<body>
  <header id="page-header">
    <h1>{title}</h1>
    <p>{subtitle}</p>
    <p>{blog_name} · {date}</p>
  </header>

  <main id="layout-root">
    <aside id="toc-panel" aria-label="目录与阅读进度">
      <h2>目录</h2>
      <nav>
        <ol id="toc-list">
          <!-- 根据正文 h2/h3 自动生成 -->
        </ol>
      </nav>
      <section id="reading-progress" aria-label="阅读进度">
        <p>进度：<span id="progress-value">0%</span></p>
      </section>
    </aside>

    <article id="article-body">
      {content_html}
    </article>
  </main>

  <footer id="page-footer">
    <p>{blog_name}</p>
  </footer>

  <script>
    // 简单的滑入动画，进入时让布局更有动效感
    function slideIn(el, direction, delayMs, durationMs) {
      if (!el) return;
      const startTime = performance.now() + delayMs;
      const distance = 50;
      const initial = {opacity: 0, x: 0, y: 0};
      switch (direction) {
        case "top":    initial.y = -distance; break;
        case "bottom": initial.y =  distance; break;
        case "left":   initial.x = -distance; break;
        case "right":  initial.x =  distance; break;
      }
      el.style.opacity = "0";
      el.style.transform = "translate(" + initial.x + "px," + initial.y + "px)";

      function frame(now) {
        if (now < startTime) {
          requestAnimationFrame(frame);
          return;
        }
        const t = Math.min((now - startTime) / durationMs, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        const currentX = initial.x * (1 - eased);
        const currentY = initial.y * (1 - eased);
        el.style.transform = "translate(" + currentX + "px," + currentY + "px)";
        el.style.opacity = String(eased);
        if (t < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    // 从正文 {content_html} 中提取 h2/h3 自动生成目录
    function buildToc() {
      const article = document.getElementById("article-body");
      const tocList = document.getElementById("toc-list");
      if (!article || !tocList) return;
      const headings = article.querySelectorAll("h2, h3");
      tocList.innerHTML = "";
      headings.forEach(function (h, index) {
        if (!h.id) h.id = "sec-" + (index + 1);
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = "#" + h.id;
        a.textContent = h.textContent || ("节 " + (index + 1));
        li.appendChild(a);
        tocList.appendChild(li);
      });
    }

    // 基于正文高度计算一个简单的阅读进度
    function setupReadingProgress() {
      const article = document.getElementById("article-body");
      const progressValue = document.getElementById("progress-value");
      if (!article || !progressValue) return;

      function updateProgress() {
        const rect = article.getBoundingClientRect();
        const total = rect.height;
        if (total <= 0) {
          progressValue.textContent = "0%";
          return;
        }
        const visibleTop = Math.min(Math.max(-rect.top, 0), total);
        const ratio = Math.min(Math.max(visibleTop / total, 0), 1);
        const percent = Math.round(ratio * 100);
        progressValue.textContent = percent + "%";
      }

      document.addEventListener("scroll", updateProgress, {passive: true});
      window.addEventListener("resize", updateProgress);
      updateProgress();
    }

    // 为代码块添加折叠与一键复制功能
    function enhanceCodeBlocks() {
      const article = document.getElementById("article-body");
      if (!article) return;
      const blocks = article.querySelectorAll("pre code, pre");
      blocks.forEach(function (codeEl, index) {
        // 兼容 <pre><code> 和裸 <pre>
        const pre = codeEl.tagName === "PRE" ? codeEl : codeEl.closest("pre");
        if (!pre || pre.dataset.enhanced === "1") return;
        pre.dataset.enhanced = "1";

        const wrapper = document.createElement("div");
        wrapper.className = "code-block";

        const header = document.createElement("div");
        header.className = "code-block__header";
        const title = document.createElement("span");
        title.className = "code-block__title";
        title.textContent = codeEl.getAttribute("data-lang") || "代码片段";

        const actions = document.createElement("div");
        actions.className = "code-block__actions";

        const toggleBtn = document.createElement("button");
        toggleBtn.type = "button";
        toggleBtn.className = "code-block__btn code-block__btn--toggle";
        toggleBtn.textContent = "折叠";

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "code-block__btn code-block__btn--copy";
        copyBtn.textContent = "复制";

        actions.appendChild(toggleBtn);
        actions.appendChild(copyBtn);
        header.appendChild(title);
        header.appendChild(actions);

        const body = document.createElement("div");
        body.className = "code-block__body";

        pre.parentNode.insertBefore(wrapper, pre);
        body.appendChild(pre);
        wrapper.appendChild(header);
        wrapper.appendChild(body);

        toggleBtn.addEventListener("click", function () {
          const collapsed = body.classList.toggle("code-block__body--collapsed");
          toggleBtn.textContent = collapsed ? "展开" : "折叠";
        });

        copyBtn.addEventListener("click", function () {
          let text = "";
          if (codeEl.tagName === "CODE") {
            text = codeEl.innerText || codeEl.textContent || "";
          } else {
            text = pre.innerText || pre.textContent || "";
          }
          if (!text) return;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function () {
              copyBtn.textContent = "已复制";
              setTimeout(function () {
                copyBtn.textContent = "复制";
              }, 1500);
            });
          }
        });
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      buildToc();
      setupReadingProgress();
       enhanceCodeBlocks();

      var header = document.getElementById("page-header");
      var toc = document.getElementById("toc-panel");
      var article = document.getElementById("article-body");
      var footer = document.getElementById("page-footer");

      slideIn(header,  "top",    0,    700);
      slideIn(toc,     "left",   150,  700);
      slideIn(article, "right",  250,  800);
      slideIn(footer,  "bottom", 400,  700);
    });
  </script>
</body>
</html>
